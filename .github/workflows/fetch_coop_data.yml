name: Fetch Coop Data

on:
  schedule:
    - cron: '0 5 * * *'   # 毎日 14:00 JST
    - cron: '0 17 * * *'  # 毎日 2:00 JST
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write  # 自動修正ワークフローの workflow_dispatch 起動に必要

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Fetch Coop Data
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: uv run python fetch_coop_data.py

      - name: Validate data
        id: validate
        continue-on-error: true
        run: uv run python test.py

      - name: Commit and push if changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data pdf errors
          if ! git diff --cached --quiet; then
            git commit -m "GitHub Actions: Fetch Coop Data"
            git push origin HEAD:${GITHUB_REF}
          fi

      - name: Create issue and trigger auto fix on validation failure
        if: steps.validate.outcome == 'failure' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create extraction-error \
            --description "PDFからのデータ抽出エラー" --color D93F0B --force

          # 同ラベルのopen Issueが既にあれば新規作成せずコメントで更新する
          EXISTING=$(gh issue list --label extraction-error --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists. Adding comment."
            uv run python scripts/issue_body.py > /tmp/issue_body.md
            gh issue comment "$EXISTING" --body-file /tmp/issue_body.md
            exit 0
          fi

          uv run python scripts/issue_body.py > /tmp/issue_body.md
          ISSUE_URL=$(gh issue create \
            --title "データ抽出エラー: $(date +%Y-%m-%d)" \
            --label extraction-error \
            --body-file /tmp/issue_body.md)
          ISSUE_NUMBER=$(basename "$ISSUE_URL")
          echo "Created issue #$ISSUE_NUMBER"

          # GITHUB_TOKENで作成したIssueはissuesイベントを発火しないため、
          # 自動修正ワークフローを workflow_dispatch で直接起動する
          gh workflow run claude_auto_fix.yml -f issue_number="$ISSUE_NUMBER"

      - name: Fail job if validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1
